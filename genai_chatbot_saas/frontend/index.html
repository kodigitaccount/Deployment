<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI Chatbot SaaS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">🤖</div>
            <h2>GenAI Bot</h2>
        </div>
        
        <button class="new-chat" id="newChatBtn">+ New Chat</button>
        
        </aside>

    <main class="main">
        
        <header class="header">
            <div>
                <h1>Dashboard</h1>
                <p>Welcome back! Let's build something today.</p>
            </div>
            <button id="themeBtn">🌓</button>
        </header>

        <div class="chat-container">
            <div class="welcome-message" id="welcomeMessage">
                <h2>How can I help you today?</h2>
                <p>Ask me anything from coding to creative writing.</p>
            </div>

            <div class="chat-feed" id="chatFeed"></div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your message here...">
                <button id="sendBtn">Send</button>
            </div>
        </div>

        <footer>
            &copy; 2026 GenAI Chatbot SaaS by PRAKASH SENAPATI.
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
